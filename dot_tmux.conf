# Change prefix from ctrl+b to ctrl+space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Navigate panes with ctrl+shift+arrow (no prefix needed)
bind -n C-S-Left  select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up    select-pane -U
bind -n C-S-Down  select-pane -D

# Split panes with prefix + arrow (arrow points to where the new pane opens)
unbind '"'
unbind %
bind Right split-window -h -c "#{pane_current_path}"
bind Down split-window -v -c "#{pane_current_path}"
bind Left split-window -h -b -c "#{pane_current_path}"
bind Up split-window -v -b -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# Clock colour (prefix + t)
set -g clock-mode-colour "#FF5073"

# Pane borders — all grey, active pane label in pink
set -g pane-active-border-style fg="#545454"
set -g pane-border-style fg="#545454"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#FF5073] #P · #{pane_current_command} ,#[fg=#888888] #P · #{pane_current_command} }"

set -g status off

# Vi copy mode + clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Space or Ctrl+C dismisses the forced clock (tmux-clock script).
# clock-mode captures keystrokes, so these go through tmux's clock key-table
# rather than reaching the script as a signal.
bind -T clock Space run-shell "rm -f /tmp/tmux-clock-#{session_name}"
bind -T clock C-c   run-shell "rm -f /tmp/tmux-clock-#{session_name}"
